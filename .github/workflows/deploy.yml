name: CI/CD Pipeline

# Trigger: run on every push to main and on pull requests targeting main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Docker Hub image name (set DOCKERHUB_USERNAME in GitHub Secrets)
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/taskflow

jobs:
  # ============================================================
  # JOB 1: TEST — lint, run Django test suite against PostgreSQL
  # ============================================================
  test:
    name: Run Tests & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run flake8 lint check
        run: |
          flake8 core/ config/ --max-line-length=120 \
            --exclude=migrations,__pycache__ \
            --ignore=E501,W503

      - name: Run Django tests
        env:
          DJANGO_SECRET_KEY: ci-testing-secret-key-not-for-production
          DEBUG: 'True'
          DB_ENGINE: django.db.backends.postgresql
          DB_NAME: test_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: '5432'
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py test --verbosity=2

  # ============================================================
  # JOB 2: BUILD — build Docker image and push to Docker Hub
  # Only runs on push to main (not on pull requests)
  # ============================================================
  build:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tag with 'latest' and the commit SHA for traceability/rollback
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          # Use GitHub Actions cache to speed up rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # JOB 3: DEPLOY — SSH into server and update running containers
  # ============================================================
  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/taskflow

            echo "==> Pulling latest images from Docker Hub..."
            docker compose -f docker-compose.prod.yml pull

            echo "==> Restarting services with zero-downtime rolling update..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "==> Running database migrations..."
            docker compose -f docker-compose.prod.yml exec -T web \
              python manage.py migrate --noinput

            echo "==> Collecting static files..."
            docker compose -f docker-compose.prod.yml exec -T web \
              python manage.py collectstatic --noinput

            echo "==> Cleaning up unused Docker images..."
            docker image prune -f

            echo "==> Deployment complete!"
            docker compose -f docker-compose.prod.yml ps
