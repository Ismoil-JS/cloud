name: ci-cd pipeline

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: ghcr.io/ismoil-js/cloud:latest
  PROJECT_DIR: /home/${{ secrets.SERVER_USERNAME }}/cloud

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CICD_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          CICD_TOKEN: ${{ secrets.CICD_TOKEN }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          PROJECT_DIR: ${{ env.PROJECT_DIR }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_ALLOWED_HOSTS: ${{ secrets.DJANGO_ALLOWED_HOSTS }}
          DB_ENGINE: ${{ secrets.DB_ENGINE }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: CICD_TOKEN,IMAGE_NAME,PROJECT_DIR,DJANGO_SECRET_KEY,DJANGO_ALLOWED_HOSTS,DB_ENGINE,DB_USER,DB_PASSWORD
          script: |
            set -e

            # Ensure project directory exists
            mkdir -p "$PROJECT_DIR"

            if [ -d "$PROJECT_DIR" ] && [ ! -d "$PROJECT_DIR/.git" ]; then
              rm -rf "$PROJECT_DIR"
            fi

            if [ ! -d "$PROJECT_DIR/.git" ]; then
              git clone https://github.com/Ismoil-JS/cloud.git "$PROJECT_DIR"
            fi

            cd "$PROJECT_DIR"

            git fetch origin
            git checkout master
            git pull origin master

            # Build CSRF origins
            CSRF_ORIGINS=$(echo "$DJANGO_ALLOWED_HOSTS" | tr ',' '\n' | sed 's|^|https://|' | paste -sd ',')

            printf '%s\n' \
              "DJANGO_SECRET_KEY=$DJANGO_SECRET_KEY" \
              "DEBUG=False" \
              "DJANGO_ALLOWED_HOSTS=*" \
              "SECURE_SSL_REDIRECT=False" \
              "DB_ENGINE=$DB_ENGINE" \
              "DB_NAME=taskmanager" \
              "DB_USER=$DB_USER" \
              "DB_PASSWORD=$DB_PASSWORD" \
              "DB_HOST=db" \
              "DB_PORT=5432" > .env

            echo "$CICD_TOKEN" | docker login ghcr.io -u ismoil-js --password-stdin

            docker compose -f docker-compose.prod.yml pull

            docker compose -f docker-compose.prod.yml down

            docker volume rm task-management_static_files task-management_media_files 2>/dev/null || true

            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            docker image prune -af

            echo "Deployment successful"
