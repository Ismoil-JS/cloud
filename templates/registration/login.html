{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-sm-8 col-md-6 col-lg-4">
        <div class="card border-0 shadow-sm mt-5">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-kanban-fill fs-1 text-primary"></i>
                    <h3 class="fw-bold mt-2">TaskFlow</h3>
                    <p class="text-muted">Sign in to your account</p>
                </div>

                {% if form.errors %}
                <div class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle me-1"></i>
                    Invalid username or password. Please try again.
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label fw-semibold">Username</label>
                        <input type="text" name="username" id="id_username"
                               class="form-control" placeholder="Enter your username" autofocus required>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" id="id_password"
                               class="form-control" placeholder="Enter your password" required>
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
                    </button>
                </form>

                <hr class="my-3">
                <div class="text-center">
                    <small class="text-muted">
                        Don't have an account?
                        <a href="{% url 'register' %}" class="fw-semibold">Register here</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
