{% extends 'base.html' %}

{% block title %}Delete Project{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm border-danger border-top border-4 mt-4">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle-fill fs-1 text-danger mb-3 d-block"></i>
                <h4 class="fw-bold">Delete Project?</h4>
                <p class="text-muted">
                    You are about to permanently delete
                    <strong>"{{ object.title }}"</strong>
                    and all its tasks. This action cannot be undone.
                </p>
                <div class="d-flex justify-content-center gap-3 mt-4">
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="bi bi-trash me-1"></i>Yes, Delete
                        </button>
                    </form>
                    <a href="{% url 'project-detail' object.pk %}" class="btn btn-outline-secondary px-4">
                        Cancel
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
