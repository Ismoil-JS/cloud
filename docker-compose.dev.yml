version: '3.8'

# Development compose — mounts source code for live reload, uses Django runserver
services:
  db:
    image: postgres:15-alpine
    container_name: taskflow_db_dev
    environment:
      POSTGRES_DB: taskmanager
      POSTGRES_USER: taskmanager
      POSTGRES_PASSWORD: taskmanager_password
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmanager -d taskmanager"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: taskflow_web_dev
    # Override entrypoint for dev: skip wait/migrate (handled manually)
    entrypoint: []
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app          # Live code reload
      - dev_static:/app/staticfiles
      - dev_media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_dev_data:
  dev_static:
  dev_media:
